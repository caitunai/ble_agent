name: ble_agent
description: Flutter SDK for BLE device management and translation services.
version: 1.0.0
homepage: https://github.com/caitunai/ble_agent
repository: https://github.com/caitunai/ble_agent
issue_tracker: https://github.com/caitunai/ble_agent/issues

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.caitun.ble_agent
        pluginClass: BleAgentFlutterPlugin
      ios:
        pluginClass: BleAgentFlutterPlugin
